# Dataset sweep matrix for Modal finetune + lm-eval pipeline.
# Smoke limits keep hackathon runs affordable; bump max_steps / limit for full runs.

defaults:
  preset: minicpm5-1b
  mode: lora
  max_steps: 100
  lm_eval_config: research/evals/configs/lm_eval_smoke.yaml
  baseline_config: research/evals/configs/lm_eval_compare_study.yaml

finetune:
  - name: lesson-lora
    dataset: research/data/education-lesson-chat.jsonl
    format: chat
    description: Lesson-agent chat data (Well-Tuned primary)

  - name: alpaca-lora
    dataset: tatsu-lab/alpaca
    format: alpaca
    dataset_split: train
    max_samples: 200
    description: General instruction tuning (Hub)

  - name: smoltalk-lora
    dataset: HuggingFaceTB/smoltalk
    format: chat
    dataset_config: all
    dataset_split: "train[:500]"
    max_samples: 500
    description: Multi-turn chat subset (Hub)
