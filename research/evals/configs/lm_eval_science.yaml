# Science profile — fact recall + elementary science reasoning
# Run: slm-lm-eval --profile science --preset minicpm5-1b --experiment-name science-baseline

profile: science
claim: Better science knowledge

tasks:
  - sciq
  - openbookqa
  - arc_challenge

num_fewshot: null   # per-task canonical fewshot (sciq/openbookqa/arc 0-shot)
limit: 200           # larger sample -> tighter stderr for gate decisions
seed: 42
batch_size: auto
device: auto
dtype: bfloat16
trust_remote_code: true
output_dir: results/lm_eval
