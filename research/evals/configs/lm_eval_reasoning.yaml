# Reasoning profile — math + commonsense + science QA
# Run: slm-lm-eval --profile reasoning --preset minicpm5-1b --experiment-name reasoning-baseline

profile: reasoning
claim: Better reasoning

tasks:
  - gsm8k
  - arc_easy
  - arc_challenge
  - hellaswag

num_fewshot: null   # per-task canonical fewshot (gsm8k 5-shot, MC tasks 0-shot)
limit: 200           # larger sample -> tighter stderr for gate decisions
seed: 42
batch_size: auto
device: auto
dtype: bfloat16
trust_remote_code: true
output_dir: results/lm_eval
